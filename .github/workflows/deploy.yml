name: Deploy Hotstar App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hotstar-app .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/hotstar-app

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker stop $(sudo docker ps -aq) || true
            sudo docker rm $(sudo docker ps -aq) || true

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/hotstar-app

            sudo docker run -d \
              --name hotstar \
              -p 80:80 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/hotstar-app
