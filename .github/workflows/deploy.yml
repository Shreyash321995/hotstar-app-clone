name: Hotstar CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout source
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t shreyash32951/hotstar-app .

    - name: Push Docker Image
      run: |
        docker push shreyash32951/hotstar-app

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo docker stop hotstar || true
          sudo docker rm hotstar || true

          sudo docker pull shreyash32951/hotstar-app

          sudo docker run -d \
            --name hotstar \
            -p 80:80 \
            --restart always \
            -e TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
            shreyash32951/hotstar-app
