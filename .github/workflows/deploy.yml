name: Build and Deploy Hotstar App

on:
    push:
          branches:
                  - main

          jobs:
              build-and-deploy:
                    runs-on: ubuntu-latest

                          steps:

                                - name: Checkout Code
                                        uses: actions/checkout@v4

                                              - name: Login to DockerHub
                                                      uses: docker/login-action@v3
                                                              with:
                                                                        username: ${{ secrets.DOCKER_USERNAME }}
                                                                                  password: ${{ secrets.DOCKER_PASSWORD }}

                                                                                        - name: Build Docker Image
                                                                                                run: |
                                                                                                          docker build -t ${{ secrets.DOCKER_USERNAME }}/hotstar-app:latest .

                                                                                                              - name: Push to DockerHub
                                                                                                                      run: |
                                                                                                                                docker push ${{ secrets.DOCKER_USERNAME }}/hotstar-app:latest

                                                                                                                                    - name: Deploy to EC2
                                                                                                                                            uses: appleboy/ssh-action@v1.0.3
                                                                                                                                                    with:
                                                                                                                                                              host: ${{ secrets.EC2_HOST }}
                                                                                                                                                                        username: ubuntu
                                                                                                                                                                                  key: ${{ secrets.EC2_SSH_KEY }}
                                                                                                                                                                                            script: |
                                                                                                                                                                                                        sudo docker pull ${{ secrets.DOCKER_USERNAME }}/hotstar-app:latest
                                                                                                                                                                                                                  sudo docker stop hotstar-app || true
                                                                                                                                                                                                                            sudo docker rm hotstar-app || true
                                                                                                                                                                                                                                      sudo docker run -d -p 80:80 \
                                                                                                                                                                                                                                                  --name hotstar-app \
                                                                                                                                                                                                                                                              -e TMDB_API_KEY=${{ secrets.TMDB_API_KEY }} \
                                                                                                                                                                                                                                                                          ${{ secrets.DOCKER_USERNAME }}/hotstar-app:latest
