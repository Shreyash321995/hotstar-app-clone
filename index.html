<!DOCTYPE html>
<html lang="en">
	<head>
		  <meta charset="UTF-8">
		    <meta name="viewport" content="width=device-width, initial-scale=1.0">
		      <title>Hotstar Clone</title>

		        <style>
    * {
	          margin: 0;
		        padding: 0;
			      box-sizing: border-box;
			            font-family: Arial, sans-serif;
				        }

        body {
		      background-color: #0f1014;
		            color: white;
			        }

	    header {
		          background-color: #121926;
			        padding: 20px;
				      display: flex;
				            justify-content: space-between;
					          align-items: center;
						      }

	        .logo {
			      font-size: 28px;
			            font-weight: bold;
				          color: #00a8ff;
					      }

		    nav a {
			          color: white;
				        text-decoration: none;
					      margin-left: 20px;
					            font-size: 18px;
						        }

		        .banner {
				      width: 100%;
				            height: 500px;
					          background: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
						        display: flex;
							      align-items: center;
							            justify-content: center;
								        }

			    .banner h1 {
				          background-color: rgba(0,0,0,0.6);
					        padding: 20px;
						      border-radius: 10px;
						            font-size: 50px;
							        }

			        .movies {
					      padding: 40px;
					          }

				    .movies h2 {
					          margin-bottom: 20px;
						      }

				        .movie-row {
						      display: flex;
						            gap: 20px;
							          overflow-x: auto;
								      }

					    .movie-card {
						          min-width: 250px;
							        transition: transform 0.3s;
								    }

					        .movie-card:hover {
							      transform: scale(1.05);
							          }

						    .movie-card img {
							          width: 100%;
								        border-radius: 10px;
									    }

						        .trailers {
								      padding: 40px;
								          }

							    .trailers h2 {
								          margin-bottom: 20px;
									      }

							        iframe {
									      border-radius: 10px;
									          }

								    footer {
									          text-align: center;
										        padding: 20px;
											      background-color: #121926;
											            margin-top: 40px;
												        }
								      </style>
	</head>

	<body>

		  <header>
			      <div class="logo">HOTSTAR</div>

			          <nav>
					        <a href="#">Home</a>
						      <a href="#">Movies</a>
						            <a href="#">Sports</a>
							          <a href="#">TV Shows</a>
								      </nav>
								        </header>

									  <section class="banner">
										      <h1>Unlimited Entertainment</h1>
										        </section>

											  <section class="movies">
												      <h2>Trending Movies</h2>

												          <div class="movie-row">

														        <div class="movie-card">
																        <img src="https://wallpapercave.com/wp/wp4056410.jpg" alt="">
																	      </div>

																	            <div class="movie-card">
																			            <img src="https://wallpapercave.com/wp/wp8801631.jpg" alt="">
																				          </div>

																					        <div class="movie-card">
																							        <img src="https://wallpapercave.com/wp/wp1817978.jpg" alt="">
																								      </div>

																								            <div class="movie-card">
																										            <img src="https://wallpapercave.com/wp/wp4056410.jpg" alt="">
																											          </div>

																												      </div>
																												        </section>

																													  <section class="trailers">
																														      <h2>Latest Trailer</h2>

																														          <iframe
																																	        width="100%"
																																		      height="500"
																																		            src="https://www.youtube.com/embed/2QR11oDukn4"
																																			          title="Trailer"
																																				        frameborder="0"
																																					      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
																																					            allowfullscreen>
																																      </iframe>

																																        </section>

																																	  <footer>
																																		      <p>Hotstar Clone DevOps Project | AWS + Docker + GitHub Actions</p>
																																		        </footer>

	</body>
</html>
