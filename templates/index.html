<!DOCTYPE html>
<html>
	<head>
		    <title>Mini Hotstar</title>
		        <link rel="stylesheet" href="/static/style.css">
	</head>
	<body>

		<h1>🎬 Mini Hotstar</h1>

		<!-- 🔍 Search Bar -->
		<form action="/search" method="get">
			    <input type="text" name="q" placeholder="Search movies...">
			        <button type="submit">Search</button>
		</form>

		<!-- 🎥 Movie Grid -->
		<div class="container">
			    {% for movie in movies %}
			            <div class="card">
					                <img src="{{ movie.image }}">
							            <h3>{{ movie.title }}</h3>
								            </div>
									        {% endfor %}
		</div>

	</body>
</html>
